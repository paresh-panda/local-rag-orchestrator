services:

  # ── Ollama LLM runtime ──
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ── RAG pipeline ──
  pdf-engine:
    build: .
    container_name: pdf-insights-engine
    depends_on:
      - ollama
    volumes:
      - ./db:/app/db
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./input:/app/data
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - PYTHONUNBUFFERED=1
      - DEBUG=True

  # ── FastAPI — talks to pdf-engine's shared src/ and db/ ──
  api:
    build:
      context: ./rag_chat/api
    container_name: pdf-insights-api
    depends_on:
      - ollama
      - pdf-engine
    ports:
      - "8000:8000"
    volumes:
      - ./db:/app/db        # shared vector DB with pdf-engine
      - ./src:/app/src      # shared RAG source code (read-only)
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - PYTHONUNBUFFERED=1
      - RELEVANCE_CUTOFF=0.45
    restart: unless-stopped

  # ── React UI — talks only to api ──
  frontend:
    build:
      context: ./rag_chat/frontend
    container_name: pdf-insights-ui
    depends_on:
      - api
    ports:
      - "3000:80"
    restart: unless-stopped

  # ── Tests ──
  tests:
    build: .
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./db:/app/db
    command: ["pytest", "-v", "tests/"]
